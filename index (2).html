<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Register — Client Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper: #EDEFEA;
  --paper-raised: #F7F8F4;
  --ink: #1F2A24;
  --ink-soft: #55635A;
  --line: #C9CFC6;
  --line-strong: #9CA69A;
  --gst: #A6742C;
  --itr: #1F6F63;
  --loan: #6B4C6E;
  --misc: #3E5C76;
  --danger: #9C3B3B;
  font-size: 16px;
}
*{ box-sizing: border-box; }
body{
  margin:0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}
h1,h2{ font-family: 'Fraunces', serif; font-weight: 600; margin:0; }
.mono{ font-family: 'IBM Plex Mono', monospace; }

/* ---- Topbar ---- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--line);
  background: var(--paper-raised);
  position: sticky; top:0; z-index: 10;
}
.brand{ display:flex; align-items:center; gap:14px; }
.brand-mark{
  font-family:'Fraunces',serif; font-size:34px; color: var(--ink);
  border: 1.5px solid var(--ink); border-radius:50%;
  width:46px; height:46px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.brand h1{ font-size: 22px; letter-spacing: 0.2px; }
.brand-sub{ margin:2px 0 0; font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color: var(--ink-soft); }

.btn{
  font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
  padding:10px 18px; border-radius:3px; border:1px solid var(--ink); cursor:pointer;
  transition: all .15s ease;
}
.btn-primary{ background: var(--ink); color: var(--paper); }
.btn-primary:hover{ background:#3a4a3f; }
.btn-ghost{ background:transparent; color: var(--ink); }
.btn-ghost:hover{ background: var(--line); }
.btn-danger{ border-color: var(--danger); color: var(--danger); background: transparent; }
.btn-danger:hover{ background: var(--danger); color:#fff; }
.btn-small{ padding:6px 12px; font-size:13px; }

/* ---- Controls ---- */
main{ max-width: 980px; margin: 0 auto; padding: 28px; }
.controls{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom: 22px; }
.search-wrap{ display:flex; flex:1; min-width:240px; gap:8px; }
.search-input{
  flex:1; min-width:180px; padding:11px 14px; border:1px solid var(--line-strong);
  border-radius:3px; background: var(--paper-raised); font-family:'Inter'; font-size:14px; color: var(--ink);
}
.search-input:focus{ outline:2px solid var(--ink); outline-offset:1px; }
.btn-search{ flex-shrink:0; }
.chips{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{
  font-family:'IBM Plex Mono', monospace; font-size:12.5px; letter-spacing:0.4px;
  padding:8px 14px; border-radius:20px; border:1px solid var(--line-strong);
  background: transparent; color: var(--ink-soft); cursor:pointer;
}
.chip.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ---- Ledger list ---- */
.ledger{ width:100%; }
.ledger-row{
  display:grid; grid-template-columns: 90px 1fr 130px 140px;
  align-items:center; padding: 14px 10px; border-bottom: 1px solid var(--line);
  gap: 10px;
}
.ledger-headrow{
  font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase;
  letter-spacing:1px; color: var(--ink-soft); border-bottom: 1.5px solid var(--ink);
}
.client-row{ cursor:pointer; transition: background .1s ease; }
.client-row:hover{ background: var(--paper-raised); }
.col-no{ font-family:'IBM Plex Mono',monospace; font-size:13px; color: var(--ink-soft); }
.col-name{ font-family:'Fraunces',serif; font-size:16px; }
.col-mobile{ font-family:'IBM Plex Mono',monospace; font-size:13px; }
.badge{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500;
  padding:3px 9px; border-radius:2px; color:#fff; letter-spacing:0.4px; width: fit-content;
}
.empty-state{ text-align:center; color: var(--ink-soft); padding: 50px 0; font-size:14px; }

.pending-row{ opacity: 0.6; font-style: italic; }
.pending-tag{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; font-style: normal;
  color:#8a6a1f; background:#F3E4BE; padding:2px 7px; border-radius:10px; margin-left:6px; letter-spacing:0.3px;
}

/* ---- Overlay / Modal ---- */
.overlay{
  position:fixed; inset:0; background: rgba(31,42,36,0.45);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.overlay[hidden]{ display:none !important; }
.gate-overlay{ z-index: 9999; background: var(--paper); }
.gate-card{ max-width: 360px; box-shadow: none; }
.gate-error{ color: var(--danger); font-size:13px; margin-top:10px; }

/* ---- Topbar right / sync badge ---- */
.topbar-right{ display:flex; align-items:center; gap:16px; }
.sync-badge{
  display:flex; align-items:center; gap:7px; font-family:'IBM Plex Mono',monospace;
  font-size:11.5px; color: var(--ink-soft); white-space:nowrap;
}
.dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-yellow{ background:#C99A2E; }
.dot-green{ background:#2E7D4F; }
.dot-red{ background:#9C3B3B; }
.dot.pulse{ animation: pulse 1.1s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }

/* ---- Spinner ---- */
.spinner-wrap{ display:flex; justify-content:center; align-items:center; padding: 46px 0; }
.spinner{
  width:26px; height:26px; border-radius:50%;
  border: 3px solid var(--line); border-top-color: var(--ink);
  animation: spin .7s linear infinite;
}
@keyframes spin{ to{ transform: rotate(360deg); } }
.modal{
  background: var(--paper-raised); width:100%; max-width:520px; max-height:88vh;
  overflow-y:auto; border-radius:4px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
.modal-wide{ max-width: 720px; }
.modal-head{
  display:flex; align-items:flex-start; justify-content:space-between;
  padding: 22px 26px 14px; border-bottom:1px solid var(--line); position:relative;
}
.modal-head h2{ font-size:20px; }
.icon-btn{
  background:none; border:none; font-size:26px; line-height:1; cursor:pointer; color: var(--ink-soft);
}
.modal-body{ padding: 20px 26px; }
.modal-foot{
  display:flex; justify-content:flex-end; gap:10px; padding: 16px 26px; border-top:1px solid var(--line);
}

.field-label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.6px; color: var(--ink-soft); margin: 14px 0 6px; }
.field-input, textarea, select{
  width:100%; padding:10px 12px; border:1px solid var(--line-strong); border-radius:3px;
  font-family:'Inter'; font-size:14px; background:#fff; color: var(--ink);
}
textarea{ resize: vertical; min-height:60px; }
.field-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
.field-grid .full{ grid-column: 1 / -1; }

/* ---- Client detail ---- */
.stamp{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
  padding:4px 10px; border-radius:2px; color:#fff; transform: rotate(-3deg); margin-bottom:8px;
}
.detail-folio{ margin:2px 0 0; font-family:'IBM Plex Mono',monospace; font-size:12px; color: var(--ink-soft); }

.detail-section{ margin-bottom: 22px; }
.detail-section h3{
  font-family:'Fraunces',serif; font-size:15px; font-weight:600; margin: 0 0 10px;
  padding-bottom:6px; border-bottom: 1px solid var(--line);
}
.detail-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
.detail-item dt{ font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color: var(--ink-soft); }
.detail-item dd{ margin: 2px 0 0; font-size:14.5px; }
.detail-item{ margin:0; }

table.ledger-table{ width:100%; border-collapse: collapse; font-size:13.5px; }
table.ledger-table th{
  text-align:left; font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase;
  letter-spacing:0.5px; color: var(--ink-soft); border-bottom: 1.5px solid var(--ink); padding:6px 8px;
}
table.ledger-table td{ padding:8px; border-bottom: 1px solid var(--line); vertical-align:top; }
table.ledger-table a{ color: var(--ink); }
.table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
.table-scroll table{ min-width: 560px; }

.file-chip{
  display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:5px 10px;
  border:1px solid var(--line-strong); border-radius:14px; margin:3px 6px 3px 0; text-decoration:none; color: var(--ink);
}
.file-chip:hover{ background: var(--line); }

.top-actions{ display:flex; gap:10px; margin-bottom: 18px; flex-wrap:wrap; }

.inline-form{ border: 1px dashed var(--line-strong); border-radius:4px; padding:14px; margin-top:10px; }
.inline-form .field-grid{ margin-bottom: 10px; }

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background: var(--ink); color: var(--paper); padding:12px 22px; border-radius:4px;
  font-size:13.5px; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.3); max-width: 90vw; text-align:center;
}

@media (max-width: 640px){
  .topbar{ padding:14px 16px; gap:10px; }
  .brand-sub{ display:none; }
  .brand h1{ font-size:19px; }
  .brand-mark{ width:38px; height:38px; font-size:28px; }
  .topbar-right{ gap:10px; }
  .sync-badge span:last-child{ max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  main{ padding: 18px 14px; }
  .controls{ flex-direction:column; align-items:stretch; }
  .search-wrap{ width:100%; }
  .chips{ width:100%; overflow-x:auto; flex-wrap:nowrap; padding-bottom:2px; }
  .ledger-row{ grid-template-columns: 54px 1fr 78px; padding:12px 6px; }
  .col-mobile{ display:none; }
  .col-name{ font-size:14.5px; }
  .badge{ font-size:10px; padding:2px 7px; }
  .modal{ max-height:92vh; }
  .modal-head{ padding:16px 18px 12px; }
  .modal-body{ padding:16px 18px; }
  .modal-foot{ padding:14px 18px; }
  .field-grid{ grid-template-columns: 1fr; }
  .detail-grid{ grid-template-columns: 1fr; }
  .gate-card{ max-width: 92vw; }
}

</style>
</head>
<body>

<div class="overlay gate-overlay" id="gateOverlay">
  <div class="modal gate-card">
    <div class="modal-body" style="text-align:center;padding:36px 30px;">
      <span class="brand-mark" style="margin:0 auto 14px;">§</span>
      <h2 style="margin-bottom:6px;">The Register</h2>
      <p class="brand-sub" style="margin-bottom:22px;">Enter passphrase to continue on this device</p>
      <input type="password" id="gateInput" class="field-input" placeholder="Passphrase" style="text-align:center;">
      <p id="gateError" class="gate-error" hidden>Incorrect passphrase. Try again.</p>
      <button class="btn btn-primary" id="gateSubmit" style="margin-top:16px;width:100%;">Unlock</button>
    </div>
  </div>
</div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">§</span>
    <div>
      <h1>The Register</h1>
      <p class="brand-sub">Client Management</p>
    </div>
  </div>
  <div class="topbar-right">
    <div class="sync-badge" id="syncBadge">
      <span class="dot dot-yellow pulse" id="syncDot"></span>
      <span id="syncText">Syncing…</span>
    </div>
    <button class="btn btn-primary" id="addClientBtn">+ New Client</button>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="Search by name, client no., mobile, GSTIN, PAN, email…">
      <button class="btn btn-primary btn-search" id="searchBtn" aria-label="Search">Search</button>
    </div>
    <div class="chips" id="categoryChips">
      <button class="chip active" data-cat="ALL">All</button>
      <button class="chip" data-cat="GST">GST</button>
      <button class="chip" data-cat="ITR">ITR</button>
      <button class="chip" data-cat="LOAN">Loan / CMA</button>
      <button class="chip" data-cat="MISC">Misc.</button>
    </div>
  </div>

  <div class="ledger" id="ledgerHead">
    <div class="ledger-row ledger-headrow">
      <span class="col-no">Folio</span>
      <span class="col-name">Name</span>
      <span class="col-cat">Category</span>
      <span class="col-mobile">Mobile</span>
    </div>
  </div>
  <div class="ledger" id="clientList"></div>
  <p class="empty-state" id="emptyState" hidden>No clients match your search. Try a different name or clear the filter.</p>
</main>

<!-- ADD / EDIT CLIENT MODAL -->
<div class="overlay" id="addOverlay" hidden>
  <div class="modal">
    <div class="modal-head">
      <h2>New Client</h2>
      <button class="icon-btn" id="closeAddModal">&times;</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Category</label>
      <select id="newCategorySelect" class="field-input">
        <option value="GST">GST</option>
        <option value="ITR">ITR</option>
        <option value="LOAN">Loan / CMA</option>
        <option value="MISC">Misc.</option>
      </select>
      <div id="newClientFields" class="field-grid"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="cancelAddBtn">Cancel</button>
      <button class="btn btn-primary" id="saveNewClientBtn">Save Client</button>
    </div>
  </div>
</div>

<!-- CLIENT DETAIL MODAL -->
<div class="overlay" id="detailOverlay" hidden>
  <div class="modal modal-wide">
    <div class="modal-head">
      <div>
        <span class="stamp" id="detailStamp">GST</span>
        <h2 id="detailName">Client Name</h2>
        <p class="detail-folio" id="detailFolio">No. 000</p>
      </div>
      <button class="icon-btn" id="closeDetailModal">&times;</button>
    </div>
    <div class="modal-body" id="detailBody">
      <!-- populated by app.js -->
    </div>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script>
// ====== CONFIG ======
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxRIaW9MfkYPG2aRghtHPaERHVi68ciGBu0YhYtq0pR581flV8NpAcSADI3J6Pv7G05Zg/exec';
const DEVICE_PASSPHRASE = 'trusttheprocess';
const GATE_KEY = 'cms_device_verified';
const CACHE_KEY = 'cms_clients_cache';

const CATEGORY_META = {
  GST:  { label: 'GST',       color: '#A6742C' },
  ITR:  { label: 'ITR',       color: '#1F6F63' },
  LOAN: { label: 'Loan/CMA',  color: '#6B4C6E' },
  MISC: { label: 'Misc.',     color: '#3E5C76' }
};

const FIELDS = {
  GST: [
    { key: 'TradeName', label: 'Trade Name', type: 'text', required: true, full: true },
    { key: 'GSTIN', label: 'GSTIN No.', type: 'text' },
    { key: 'MobileNo', label: 'Mobile No.', type: 'tel' },
    { key: 'EmailId', label: 'Email ID', type: 'email' },
    { key: 'UserId', label: 'User ID', type: 'text' },
    { key: 'GSTPassword', label: 'GSTIN Password', type: 'text' },
    { key: 'FeesCharged', label: 'Fees Charged', type: 'text' },
    { key: 'FilingFrequency', label: 'Filing Frequency', type: 'select', options: ['Monthly', 'Quarterly'] },
    { key: 'OtherDetails', label: 'Other Details (optional)', type: 'textarea', full: true }
  ],
  ITR: [
    { key: 'Name', label: 'Name', type: 'text', required: true, full: true },
    { key: 'BirthDate', label: 'Birth Date', type: 'date' },
    { key: 'PhoneNo', label: 'Phone No.', type: 'tel' },
    { key: 'Address', label: 'Address', type: 'textarea', full: true },
    { key: 'EmailId', label: 'Email ID', type: 'email' },
    { key: 'AadharNo', label: 'Aadhar No.', type: 'text' },
    { key: 'PanNo', label: 'PAN Card No.', type: 'text' },
    { key: 'ITRPassword', label: 'ITR Password', type: 'text' },
    { key: 'AISTISPassword', label: 'AIS / TIS Password', type: 'text' },
    { key: 'OtherDetails', label: 'Other Details (optional)', type: 'textarea', full: true }
  ],
  LOAN: [
    { key: 'Name', label: 'Client Name', type: 'text', required: true, full: true },
    { key: 'MobileNo', label: 'Mobile No.', type: 'tel' },
    { key: 'LoanAmount', label: 'Loan Amount', type: 'text' },
    { key: 'Address', label: 'Address', type: 'textarea', full: true },
    { key: 'FeesCharged', label: 'Fees Charged', type: 'text' },
    { key: 'Details', label: 'Details', type: 'textarea', full: true }
  ],
  MISC: [
    { key: 'Name', label: 'Client Name', type: 'text', required: true, full: true },
    { key: 'MobileNo', label: 'Mobile No.', type: 'tel' },
    { key: 'FeesCharged', label: 'Fees Charged', type: 'text' },
    { key: 'Address', label: 'Address', type: 'textarea', full: true },
    { key: 'OtherDetails', label: 'Other Details (optional)', type: 'textarea', full: true }
  ]
};

const ENTRY_FIELDS = {
  GST: [
    { key: 'Month', label: 'Month', type: 'month' },
    { key: 'TaxableValue', label: 'Taxable Value of Sales', type: 'text' },
    { key: 'DocumentsIssued', label: 'Documents Issued', type: 'text' },
    { key: 'HSN', label: 'HSN No.', type: 'text' },
    { key: 'OtherDetails', label: 'Other Details', type: 'text' }
  ],
  ITR: [
    { key: 'Year', label: 'Year', type: 'text' },
    { key: 'ReturnFiledOn', label: 'Return Filed On', type: 'date' },
    { key: 'IncomeDeclared', label: 'Income Declared', type: 'text' },
    { key: 'TaxPaid', label: 'Tax Paid', type: 'text' },
    { key: 'FeesCharged', label: 'Fees Charged', type: 'text' }
  ]
};

const ENTRY_TABLE_COLUMNS = {
  GST: ['Month', 'TaxableValue', 'DocumentsIssued', 'HSN', 'OtherDetails', 'DocLinks'],
  ITR: ['Year', 'ReturnFiledOn', 'IncomeDeclared', 'TaxPaid', 'FeesCharged', 'DocLinks']
};

// ====== STATE ======
let allClients = [];
let activeCategory = 'ALL';
let searchTerm = '';
let currentDetail = null; // { category, clientNo }
let editMode = false;
let lastListSyncState = { state: 'synced', ts: null };
let queueTimer = null;
const QUEUE_KEY = 'cms_pending_queue';

// ====== INIT ======
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('addClientBtn').addEventListener('click', openAddModal);
  document.getElementById('closeAddModal').addEventListener('click', closeAddModal);
  document.getElementById('cancelAddBtn').addEventListener('click', closeAddModal);
  document.getElementById('saveNewClientBtn').addEventListener('click', submitNewClient);
  document.getElementById('newCategorySelect').addEventListener('change', (e) => buildAddFormFields(e.target.value));
  document.getElementById('closeDetailModal').addEventListener('click', closeDetailModal);
  document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase().trim(); renderList(); });
  document.getElementById('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); applySearch(); } });
  document.getElementById('searchBtn').addEventListener('click', applySearch);

  buildCategoryChips();

  setupGate();
});

function setupGate() {
  const gate = document.getElementById('gateOverlay');
  const input = document.getElementById('gateInput');
  const error = document.getElementById('gateError');
  const submit = document.getElementById('gateSubmit');

  if (localStorage.getItem(GATE_KEY) === '1') {
    gate.hidden = true;
    initApp();
    return;
  }

  const tryUnlock = () => {
    if (input.value === DEVICE_PASSPHRASE) {
      localStorage.setItem(GATE_KEY, '1');
      gate.hidden = true;
      initApp();
    } else {
      error.hidden = false;
      input.value = '';
      input.focus();
    }
  };
  submit.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  setTimeout(() => input.focus(), 100);
}

function initApp() {
  buildAddFormFields('GST');
  loadClients();
  startBackgroundSync();
}

function startBackgroundSync() {
  syncQueue();
  window.addEventListener('online', () => { loadClients(); syncQueue(); });
  document.addEventListener('visibilitychange', () => { if (!document.hidden) { loadClients(); syncQueue(); } });
  setInterval(() => { loadClients(); syncQueue(); }, 60000);
}

function buildCategoryChips() {
  const wrap = document.getElementById('categoryChips');
  wrap.innerHTML = '';
  const cats = [['ALL', 'All'], ['GST', 'GST'], ['ITR', 'ITR'], ['LOAN', 'Loan / CMA'], ['MISC', 'Misc.']];
  cats.forEach(([val, label]) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (val === 'ALL' ? ' active' : '');
    btn.dataset.cat = val;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = val;
      renderList();
    });
    wrap.appendChild(btn);
  });
}

function applySearch() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  renderList();
}

// ====== PENDING SYNC QUEUE (protects against data loss when offline) ======
function getQueue() {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); } catch (e) { return []; }
}
function setQueue(q) {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); return true; } catch (e) { return false; }
}
function queueAction(action, payload) {
  const q = getQueue();
  q.push({ id: 'q' + Date.now() + Math.random().toString(36).slice(2), action, payload, ts: Date.now() });
  const stored = setQueue(q);
  updateSyncBadge();
  return stored;
}

async function syncQueue() {
  const queue = getQueue();
  if (!queue.length) { updateSyncBadge(); return; }
  updateSyncBadge();
  const item = queue[0];
  try {
    const res = await apiPost(item.action, item.payload);
    const remaining = getQueue().filter(q => q.id !== item.id);
    if (res && res.ok) {
      setQueue(remaining);
      showToast('A saved change has synced.');
      await loadClients();
      if (currentDetail) await refreshDetail(true);
    } else {
      // Server rejected it outright (bad data / not found) — drop it so it doesn't block
      // the queue forever, and tell the user so they can fix it manually.
      setQueue(remaining);
      showToast('A queued change could not be saved (' + ((res && res.error) || 'unknown error') + '). Please redo it.', true);
    }
    updateSyncBadge();
    if (remaining.length) syncQueue();
  } catch (err) {
    // still offline — leave it queued, will retry automatically
    updateSyncBadge();
  }
}

// Attempts to save immediately; if the network is unavailable, queues the
// change locally (so nothing typed is lost) and syncs it automatically later.
async function submitWithFallback(action, payload, opts) {
  opts = opts || {};
  try {
    const res = await apiPost(action, payload);
    if (res && res.ok) {
      if (opts.onSuccess) opts.onSuccess(res);
      return { ok: true, res };
    } else {
      showToast((res && res.error) || 'Save failed.', true);
      return { ok: false, res };
    }
  } catch (err) {
    queueAction(action, payload);
    if (opts.onQueued) opts.onQueued();
    showToast(opts.queuedMessage || 'No connection — saved on this device. Will sync automatically.');
    setTimeout(syncQueue, 3000);
    return { ok: true, queued: true };
  }
}

function updateSyncBadge() {
  const queue = getQueue();
  if (queue.length > 0) {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    dot.className = 'dot dot-yellow pulse';
    text.textContent = queue.length + ' change' + (queue.length > 1 ? 's' : '') + ' waiting to sync…';
  } else {
    setSyncStatus(lastListSyncState.state, lastListSyncState.ts);
  }
}
async function apiGet(params) {
  const url = new URL(WEBAPP_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(WEBAPP_URL, {
    method: 'POST',
    body: JSON.stringify({ action, payload })
  });
  return res.json();
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#9C3B3B' : '#1F2A24';
  t.hidden = false;
  setTimeout(() => { t.hidden = true; }, 3200);
}
function filesToPayload(fileInput) {
  const files = Array.from(fileInput.files || []);
  return Promise.all(files.map(f => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ name: f.name, mime: f.type, data: reader.result.split(',')[1] });
    reader.onerror = reject;
    reader.readAsDataURL(f);
  })));
}

// ====== LOCAL CACHE ======
function cacheClients(list) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data: list, ts: Date.now() })); } catch (e) { /* storage full/unavailable — ignore */ }
}
function getCachedClients() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function formatTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function setSyncStatus(state, ts) {
  lastListSyncState = { state, ts };
  if (getQueue().length > 0) return; // pending queue badge takes priority
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (state === 'syncing') { dot.className = 'dot dot-yellow pulse'; text.textContent = 'Syncing…'; }
  else if (state === 'synced') { dot.className = 'dot dot-green'; text.textContent = 'Synced ' + formatTime(ts); }
  else if (state === 'stale') { dot.className = 'dot dot-yellow'; text.textContent = 'Offline — showing saved data' + (ts ? ' (' + formatTime(ts) + ')' : ''); }
  else { dot.className = 'dot dot-red'; text.textContent = 'Could not sync'; }
}

// ====== LIST ======
async function loadClients() {
  const cached = getCachedClients();
  if (cached && cached.data && cached.data.length) {
    allClients = cached.data;
    renderList();
  } else {
    document.getElementById('emptyState').hidden = true;
    document.getElementById('clientList').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  }
  setSyncStatus('syncing');
  try {
    const data = await apiGet({ action: 'listClients' });
    if (!data.ok) {
      setSyncStatus(cached ? 'stale' : 'error', cached ? cached.ts : null);
      if (!cached) showToast(data.error || 'Failed to load clients', true);
      return;
    }
    allClients = data.clients;
    cacheClients(allClients);
    renderList();
    setSyncStatus('synced', Date.now());
  } catch (err) {
    setSyncStatus(cached ? 'stale' : 'error', cached ? cached.ts : null);
    if (!cached) showToast('Could not reach the server. Check your connection.', true);
  }
}

function renderList() {
  const container = document.getElementById('clientList');
  const empty = document.getElementById('emptyState');
  let list = allClients;
  if (activeCategory !== 'ALL') list = list.filter(c => c.category === activeCategory);
  if (searchTerm) {
    const words = searchTerm.split(/\s+/).filter(Boolean);
    list = list.filter(c => {
      const haystack = ((c.name || '') + ' ' + (c.clientNo || '') + ' ' + (c.mobile || '') + ' ' + (c.search || '')).toLowerCase();
      return words.every(w => haystack.includes(w));
    });
  }
  container.innerHTML = '';
  if (list.length === 0) { empty.hidden = false; return; }
  empty.hidden = true;

  list.forEach(c => {
    const meta = CATEGORY_META[c.category] || { label: c.category, color: '#555' };
    const row = document.createElement('div');
    row.className = 'ledger-row client-row' + (c.pending ? ' pending-row' : '');
    row.innerHTML = `
      <span class="col-no mono">${c.pending ? '…' : c.clientNo}</span>
      <span class="col-name">${escapeHtml(c.name || '(unnamed)')}${c.pending ? ' <span class="pending-tag">syncing…</span>' : ''}</span>
      <span class="col-cat"><span class="badge" style="background:${meta.color}">${meta.label}</span></span>
      <span class="col-mobile">${escapeHtml(c.mobile || '')}</span>
    `;
    row.addEventListener('click', () => {
      if (c.pending) { showToast('This client is still syncing — try again in a moment.'); return; }
      openDetailModal(c.category, c.clientNo);
    });
    container.appendChild(row);
  });
}

function monthValueToLabel(value) {
  if (!value) return '';
  const parts = value.split('-');
  if (parts.length !== 2) return value;
  const names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const idx = parseInt(parts[1], 10) - 1;
  return (names[idx] || parts[1]) + ' ' + parts[0];
}
function formatCellValue(fieldDef, value) {
  if (!value) return '—';
  if (fieldDef && fieldDef.type === 'date') {
    const d = new Date(value);
    if (!isNaN(d)) return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  return escapeHtml(value);
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
}

// ====== ADD CLIENT MODAL ======
function openAddModal() {
  document.getElementById('newCategorySelect').value = 'GST';
  buildAddFormFields('GST');
  document.getElementById('addOverlay').hidden = false;
}
function closeAddModal() { document.getElementById('addOverlay').hidden = true; }

function buildAddFormFields(category) {
  const wrap = document.getElementById('newClientFields');
  wrap.innerHTML = '';
  FIELDS[category].forEach(f => {
    const labelEl = document.createElement('label');
    labelEl.className = 'field-label' + (f.full ? ' full' : '');
    labelEl.textContent = f.label;
    labelEl.style.gridColumn = f.full ? '1 / -1' : 'auto';

    let inputEl;
    if (f.type === 'textarea') { inputEl = document.createElement('textarea'); }
    else if (f.type === 'select') {
      inputEl = document.createElement('select');
      f.options.forEach(o => {
        const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
        inputEl.appendChild(opt);
      });
    } else {
      inputEl = document.createElement('input'); inputEl.type = f.type;
    }
    inputEl.className = 'field-input' + (f.full ? ' full' : '');
    inputEl.id = 'new_' + f.key;
    inputEl.dataset.key = f.key;
    if (f.full) { labelEl.style.gridColumn = '1 / -1'; inputEl.style.gridColumn = '1 / -1'; }

    wrap.appendChild(labelEl);
    wrap.appendChild(inputEl);
  });
}

async function submitNewClient() {
  const category = document.getElementById('newCategorySelect').value;
  const fields = {};
  FIELDS[category].forEach(f => {
    fields[f.key] = document.getElementById('new_' + f.key).value.trim();
  });
  const nameField = FIELDS[category][0].key;
  if (!fields[nameField]) { showToast('Please enter a name before saving.', true); return; }

  const btn = document.getElementById('saveNewClientBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  await submitWithFallback('addClient', { category, fields }, {
    onSuccess: () => { showToast('Client added.'); closeAddModal(); loadClients(); },
    onQueued: () => {
      const tempNo = category + '-PENDING-' + Date.now().toString(36).toUpperCase();
      allClients.push({
        clientNo: tempNo, category, name: fields[nameField], mobile: fields.MobileNo || '',
        search: Object.values(fields).join(' ').toLowerCase(), pending: true
      });
      cacheClients(allClients);
      renderList();
      closeAddModal();
    },
    queuedMessage: 'No connection — client saved on this device, will sync automatically.'
  });
  btn.disabled = false; btn.textContent = 'Save Client';
}

// ====== DETAIL CACHE ======
function detailCacheKey(category, clientNo) { return 'cms_detail_' + category + '_' + clientNo; }
function cacheDetail(category, clientNo, data) {
  try { localStorage.setItem(detailCacheKey(category, clientNo), JSON.stringify({ data, ts: Date.now() })); } catch (e) { /* ignore */ }
}
function getCachedDetail(category, clientNo) {
  try {
    const raw = localStorage.getItem(detailCacheKey(category, clientNo));
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

// ====== DETAIL MODAL ======
async function openDetailModal(category, clientNo) {
  currentDetail = { category, clientNo };
  editMode = false;
  document.getElementById('detailOverlay').hidden = false;

  const cached = getCachedDetail(category, clientNo);
  if (cached && cached.data) {
    applyDetailToUI(cached.data);
  } else {
    document.getElementById('detailName').textContent = 'Loading…';
    document.getElementById('detailFolio').textContent = '';
    document.getElementById('detailStamp').textContent = '';
    document.getElementById('detailStamp').style.background = '#9CA69A';
    document.getElementById('detailBody').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  }
  await refreshDetail(!!cached);
}
function closeDetailModal() { document.getElementById('detailOverlay').hidden = true; currentDetail = null; }

async function refreshDetail(silent) {
  const { category, clientNo } = currentDetail;
  try {
    const data = await apiGet({ action: 'getClient', category, clientNo });
    // ignore if the popup moved to a different client (or closed) while this was in flight
    if (!currentDetail || currentDetail.category !== category || currentDetail.clientNo !== clientNo) return;
    if (editMode) return; // don't clobber an in-progress edit
    if (!data.ok) { if (!silent) showToast(data.error || 'Could not load client', true); return; }
    cacheDetail(category, clientNo, data);
    applyDetailToUI(data);
  } catch (err) {
    if (!silent) showToast('Could not reach the server.', true);
  }
}

function applyDetailToUI(data) {
  const { category } = currentDetail;
  const meta = CATEGORY_META[category];
  const nameField = FIELDS[category][0].key;
  document.getElementById('detailStamp').textContent = meta.label;
  document.getElementById('detailStamp').style.background = meta.color;
  document.getElementById('detailName').textContent = data.client[nameField] || '(unnamed)';
  document.getElementById('detailFolio').textContent = 'No. ' + data.client.ClientNo;
  renderDetailBody(data);
}

function renderDetailBody(data) {
  const { category } = currentDetail;
  const client = data.client;
  const body = document.getElementById('detailBody');
  body.innerHTML = '';

  // top actions
  const actions = document.createElement('div');
  actions.className = 'top-actions';
  const editBtn = document.createElement('button');
  editBtn.className = 'btn btn-ghost btn-small';
  editBtn.textContent = editMode ? 'Cancel Edit' : 'Edit Details';
  editBtn.addEventListener('click', () => { editMode = !editMode; renderDetailBody(data); });
  actions.appendChild(editBtn);

  if (editMode) {
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary btn-small';
    saveBtn.textContent = 'Save Changes';
    saveBtn.addEventListener('click', () => saveEditedDetails(client));
    actions.appendChild(saveBtn);
  }
  if (client.DriveLink) {
    const driveBtn = document.createElement('a');
    driveBtn.className = 'btn btn-ghost btn-small';
    driveBtn.href = client.DriveLink; driveBtn.target = '_blank';
    driveBtn.textContent = 'Open Drive Folder ↗';
    actions.appendChild(driveBtn);
  }
  body.appendChild(actions);

  // details section
  const section = document.createElement('div');
  section.className = 'detail-section';
  const h3 = document.createElement('h3'); h3.textContent = 'Details';
  section.appendChild(h3);

  if (editMode) {
    const grid = document.createElement('div');
    grid.className = 'field-grid';
    FIELDS[category].forEach(f => {
      const label = document.createElement('label');
      label.className = 'field-label' + (f.full ? ' full' : '');
      label.textContent = f.label;
      let input;
      if (f.type === 'textarea') { input = document.createElement('textarea'); }
      else if (f.type === 'select') {
        input = document.createElement('select');
        f.options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; input.appendChild(opt); });
      } else { input = document.createElement('input'); input.type = f.type; }
      input.className = 'field-input';
      input.id = 'edit_' + f.key;
      input.value = client[f.key] || '';
      if (f.full) { label.style.gridColumn = '1/-1'; input.style.gridColumn = '1/-1'; }
      grid.appendChild(label); grid.appendChild(input);
    });
    section.appendChild(grid);
  } else {
    const dl = document.createElement('dl');
    dl.className = 'detail-grid';
    FIELDS[category].forEach(f => {
      const item = document.createElement('div');
      item.className = 'detail-item' + (f.full ? '' : '');
      item.innerHTML = `<dt>${f.label}</dt><dd>${escapeHtml(client[f.key] || '—')}</dd>`;
      dl.appendChild(item);
    });
    section.appendChild(dl);
  }
  body.appendChild(section);

  // documents section
  body.appendChild(buildDocsSection(data));

  // entries table (GST/ITR only)
  if (ENTRY_FIELDS[category]) {
    body.appendChild(buildEntriesSection(data));
  }
}

function buildDocsSection(data) {
  const { category, clientNo } = currentDetail;
  const wrap = document.createElement('div');
  wrap.className = 'detail-section';
  wrap.innerHTML = '<h3>Client Documents</h3>';

  const filesWrap = document.createElement('div');
  if (data.documentFiles && data.documentFiles.length) {
    data.documentFiles.forEach(f => {
      const a = document.createElement('a');
      a.href = f.url; a.target = '_blank'; a.className = 'file-chip';
      a.textContent = '📄 ' + f.name;
      filesWrap.appendChild(a);
    });
  } else {
    filesWrap.innerHTML = '<p style="color:var(--ink-soft);font-size:13.5px;">No documents uploaded yet.</p>';
  }
  wrap.appendChild(filesWrap);

  const uploadRow = document.createElement('div');
  uploadRow.style.marginTop = '10px';
  uploadRow.innerHTML = `<input type="file" id="docsUploadInput" multiple style="font-size:13px;">`;
  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'btn btn-ghost btn-small';
  uploadBtn.style.marginLeft = '10px';
  uploadBtn.textContent = 'Upload';
  uploadBtn.addEventListener('click', async () => {
    const input = document.getElementById('docsUploadInput');
    if (!input.files.length) { showToast('Choose files first.', true); return; }
    uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading…';
    try {
      const files = await filesToPayload(input);
      const result = await submitWithFallback('uploadDocs', { category, clientNo, files, folderType: 'documents' }, {
        onSuccess: () => showToast('Documents uploaded.'),
        queuedMessage: 'No connection — files saved on this device, will upload automatically once online.'
      });
      if (!result.tooLarge) input.value = '';
      if (result.ok && !result.queued) await refreshDetail();
    } finally {
      uploadBtn.disabled = false; uploadBtn.textContent = 'Upload';
    }
  });
  uploadRow.appendChild(uploadBtn);
  wrap.appendChild(uploadRow);

  return wrap;
}

function buildEntriesSection(data) {
  const { category, clientNo } = currentDetail;
  const wrap = document.createElement('div');
  wrap.className = 'detail-section';
  const title = category === 'GST' ? 'Monthly Filing Record' : 'Yearly Return Record';
  wrap.innerHTML = `<h3>${title}</h3>`;

  const cols = ENTRY_TABLE_COLUMNS[category];
  const fieldMap = {};
  ENTRY_FIELDS[category].forEach(f => { fieldMap[f.key] = f; });
  const tableScroll = document.createElement('div');
  tableScroll.className = 'table-scroll';
  const table = document.createElement('table');
  table.className = 'ledger-table';
  const theadLabels = ENTRY_FIELDS[category].map(f => f.label).concat(['Documents']);
  table.innerHTML = `<thead><tr>${theadLabels.map(l => `<th>${l}</th>`).join('')}</tr></thead>`;
  const tbody = document.createElement('tbody');

  (data.entries || []).slice().reverse().forEach(entry => {
    const tr = document.createElement('tr');
    if (entry.pending) tr.className = 'pending-row';
    const cells = cols.map(c => {
      if (c === 'DocLinks') {
        if (entry.pending) return '<td><span class="pending-tag">syncing…</span></td>';
        if (!entry.DocLinks) return '<td>—</td>';
        const links = entry.DocLinks.split(',').map((u, i) => `<a href="${u.trim()}" target="_blank">File ${i + 1}</a>`).join(', ');
        return `<td>${links}</td>`;
      }
      return `<td>${formatCellValue(fieldMap[c], entry[c])}</td>`;
    }).join('');
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableScroll.appendChild(table);
  wrap.appendChild(tableScroll);

  if (!data.entries || data.entries.length === 0) {
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--ink-soft);font-size:13.5px;margin-top:8px;';
    p.textContent = 'No entries recorded yet.';
    wrap.appendChild(p);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-ghost btn-small';
  addBtn.style.marginTop = '12px';
  addBtn.textContent = '+ Add Entry';
  const formHolder = document.createElement('div');

  addBtn.addEventListener('click', () => {
    if (formHolder.children.length) { formHolder.innerHTML = ''; return; }
    formHolder.appendChild(buildEntryForm(category, clientNo));
  });

  wrap.appendChild(addBtn);
  wrap.appendChild(formHolder);
  return wrap;
}

function buildEntryForm(category, clientNo) {
  const form = document.createElement('div');
  form.className = 'inline-form';
  const grid = document.createElement('div');
  grid.className = 'field-grid';

  ENTRY_FIELDS[category].forEach(f => {
    const label = document.createElement('label');
    label.className = 'field-label';
    label.textContent = f.label;
    const input = document.createElement('input');
    input.type = f.type; input.className = 'field-input';
    input.id = 'entry_' + f.key;
    grid.appendChild(label); grid.appendChild(input);
  });
  form.appendChild(grid);

  const fileLabel = document.createElement('label');
  fileLabel.className = 'field-label';
  fileLabel.textContent = category === 'GST' ? 'Upload this month\'s documents / return' : 'Upload this year\'s return';
  form.appendChild(fileLabel);
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.multiple = true; fileInput.id = 'entryFileInput';
  form.appendChild(fileInput);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary btn-small';
  saveBtn.style.marginTop = '14px';
  saveBtn.textContent = 'Save Entry';
  saveBtn.addEventListener('click', async () => {
    const entry = {};
    ENTRY_FIELDS[category].forEach(f => {
      let val = document.getElementById('entry_' + f.key).value.trim();
      if (f.type === 'month') val = monthValueToLabel(val);
      entry[f.key] = val;
    });
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      const files = await filesToPayload(fileInput);
      const result = await submitWithFallback('addEntry', { category, clientNo, entry, files }, {
        onSuccess: () => showToast('Entry added.'),
        onQueued: () => {
          const cached = getCachedDetail(category, clientNo);
          const data = (cached && cached.data) || { ok: true, category, client: {}, entries: [] };
          data.entries = data.entries || [];
          data.entries.push(Object.assign({}, entry, { EntryId: 'pending', DocLinks: '', pending: true }));
          cacheDetail(category, clientNo, data);
          if (currentDetail && currentDetail.category === category && currentDetail.clientNo === clientNo) applyDetailToUI(data);
        },
        queuedMessage: files.length
          ? 'No connection — entry saved on this device; documents will upload once you\'re back online.'
          : 'No connection — entry saved on this device, will sync automatically.'
      });
      if (result.ok && !result.queued) await refreshDetail();
    } finally {
      saveBtn.disabled = false; saveBtn.textContent = 'Save Entry';
    }
  });
  form.appendChild(saveBtn);
  return form;
}

async function saveEditedDetails(client) {
  const { category, clientNo } = currentDetail;
  const fields = {};
  FIELDS[category].forEach(f => { fields[f.key] = document.getElementById('edit_' + f.key).value.trim(); });

  editMode = false;
  const result = await submitWithFallback('updateClient', { category, clientNo, fields }, {
    onSuccess: () => showToast('Details updated.'),
    onQueued: () => {
      const cached = getCachedDetail(category, clientNo);
      const data = (cached && cached.data) || { ok: true, category, client: Object.assign({}, client) };
      data.client = Object.assign({}, data.client, fields);
      cacheDetail(category, clientNo, data);
      const nameField = FIELDS[category][0].key;
      allClients = allClients.map(c => (c.category === category && c.clientNo === clientNo)
        ? Object.assign({}, c, { name: data.client[nameField], mobile: data.client.MobileNo || c.mobile })
        : c);
      cacheClients(allClients);
      renderList();
      applyDetailToUI(data);
    },
    queuedMessage: 'No connection — changes saved on this device, will sync automatically.'
  });
  if (result.ok && !result.queued) {
    await refreshDetail();
    await loadClients();
  }
}
